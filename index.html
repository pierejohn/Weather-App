<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>weather</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body>
    <div>
        <div class="container">
            <nav class="navbar navbar-expand-lg py-5" data-bs-theme="dark">
                <div class="container ">
                    <div class="d-flex justify-content-between align-content-center mediam-small-w">
                        <div class="d-flex">
                            <a class="navbar-brand" href="#"><img src="imgs/logo.png" alt=""></a>
                            <div class="d-flex flex-column text-white logo">
                                <h6>Weather</h6>
                                <p>tagline goes here</p>
                            </div>
                        </div>
                        <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                            data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent"
                            aria-expanded="false" aria-label="Toggle navigation">
                            <span class="navbar-toggler-icon"></span>
                        </button>
                    </div>
                    <div class="collapse navbar-collapse " id="navbarSupportedContent">
                        <ul class="navbar-nav ms-auto mb-2 mb-lg-0  ">
                            <li class="nav-item">
                                <a class="nav-link active" aria-current="page" href="#">Home</a>
                            </li>
                            <li class="nav-item">
                                <a class="nav-link" href="#">News</a>
                            </li>
                            <li class="nav-item">
                                <a class="nav-link" href="#">Live cameras</a>
                            </li>
                            <li class="nav-item">
                                <a class="nav-link" href="#">Photos</a>
                            </li>
                            <li class="nav-item">
                                <a class="nav-link" href="#">Contact</a>
                            </li>
                        </ul>

                    </div>

                </div>
            </nav>
        </div>

        <div class="home">
            <div class="home-bg">
            </div>
            <div class="home-temp container overflow-hidden">

                <form action="" class="my-5 form-search position-relative d-flex align-items-center">
                    <input id="search" class="form-control rounded-5" type="text" placeholder="Find your location...">
                    <button type="button" class="btn btn-info text-white px-5 py-2 rounded-5 position-absolute">find</button>
                </form>

                <div class="weither rounded-3 overflow-hidden ">

                    <div class="row text-white">
                        <div class="col-lg-4 col-sm-12 today">
                            <div class="header d-flex justify-content-between px-4">
                                <div id="today"></div>
                                <div id="date"></div>
                            </div>
                            <div class="px-5 py-3">
                                <div id="city"></div>
                                <h4 id="countryName"></h4>
                                <div class="d-flex justify-content-between align-items-end">
                                    <div id="cityTemp" class="temp"></div>
                                    <img id="iconToday" src="" alt="">
                                </div>
                                <a id="tempCondition" href=""></a>
                                <div class="d-flex justify-content-start gap-3 mt-3">
                                    <div class="d-flex gap-2">
                                        <img src="imgs/icon-umberella.png" alt="">
                                        <div id="tempRain"></div>
                                    </div>
                                    <div class="d-flex gap-2">
                                        <img src="imgs/icon-wind.png" alt="">
                                        <div id="visKm"></div>
                                    </div>
                                    <div class="d-flex gap-2">
                                        <img src="imgs/icon-compass.png" alt="">
                                        <div id="windDir"></div>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div class="col-lg-4 col-sm-12 text-center tomoro ">

                            <div class="header">
                                <div id="tomoroName"></div>
                            </div>
                            <div class="px-5 py-3 d-inline-block  h-100">
                                <div class="d-flex flex-column h-75 align-items-center justify-content-center gap-3">
                                    <img id="tomoroLogo" src="" alt="" srcset="">
                                    <div>
                                        <h3 id="tomoroMaxTemp"></h3>
                                        <h6 id="tomoroMinTemp"></h6>
                                    </div>

                                    <a id="tomoroCondition" href=""></a>

                                </div>
                            </div>

                        </div>
                        <div class="col-lg-4 col-sm-12 text-center after-tomoro">

                            <div class="header">
                                <div id="afterTomoroName"></div>

                            </div>
                            <div class="px-5 py-3 d-inline-block  h-100">
                                <div class="d-flex flex-column h-75 align-items-center justify-content-center gap-3">
                                    <img id="afterTomoroLogo" src="" alt="">

                                    <div>
                                        <h3 id="afterTomoroMaxTemp"></h3>
                                        <h6 id="afterTomoroMinTemp"></h6>
                                    </div>

                                    <a id="afterTomoroCondition" href=""></a>

                                </div>
                            </div>

                        </div>

                    </div>
                </div>


            </div>

            <footer class="mt-5 overflow-auto">
                <div class="container mt-5">

                    <form action="" class="my-5 form-search position-relative d-flex align-items-center w-75">
                        <input class="form-control rounded-5" type="text" placeholder="Find your subscribe...">
                        <button class="btn btn-info text-white px-5 py-2 rounded-5 position-absolute">subscribe</button>

                    </form>
                    <p class="text-white">Copyright 2014 Company name. Designed by Themezy. All rights reserved</p>

            </footer>
        </div>
    </div>

    </div>





    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <script src="https://kit.fontawesome.com/9652c3fded.js" crossorigin="anonymous"></script>
    <script src="js.js"></script>
</body>

</html>
